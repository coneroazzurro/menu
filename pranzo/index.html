<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <meta name="theme-color" content="#ffffff">
  <meta name="description" content="Menù del pranzo - Borgo Conero, Villaggio Conero Azzurro">
  <title>Menù Pranzo · Borgo Conero</title>

  <!-- Preload dell'immagine principale per velocizzare la prima visualizzazione -->
  <link rel="preload" as="image" href="menu.jpg">

  <style>
    /* Reset essenziale */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      background: #ffffff;
      -webkit-text-size-adjust: 100%;
      -webkit-tap-highlight-color: transparent;
      overflow-x: hidden;
    }

    body {
      /* Scrolling fluido anche su iOS */
      -webkit-overflow-scrolling: touch;
    }

    /* Contenitore del menù */
    .menu-container {
      width: 100%;
      max-width: 1200px; /* su tablet/desktop non si allarga oltre */
      margin: 0 auto;
      display: flex;
      flex-direction: column;
    }

    /* Le immagini del menù */
    .menu-container img {
      width: 100%;
      height: auto;
      display: block;
      /* Evita "salti" durante il caricamento */
      background: #f5f5f5;
    }

    /* Stato di caricamento (mostrato solo se l'immagine ci mette tanto) */
    .loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      z-index: 10;
      transition: opacity 0.4s ease;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #888;
      font-size: 14px;
      letter-spacing: 0.05em;
    }

    .loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* Messaggio di errore se l'immagine non si carica */
    .error-message {
      display: none;
      padding: 60px 30px;
      text-align: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #555;
    }

    .error-message h2 {
      font-size: 18px;
      margin-bottom: 10px;
      color: #333;
    }

    .error-message p {
      font-size: 14px;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <!-- Schermata di caricamento (sparisce appena l'immagine è pronta) -->
  <div class="loading" id="loading">Caricamento menù…</div>

  <!-- Contenitore del menù -->
  <main class="menu-container" id="menu">

    <!--
      ============================================================
      ISTRUZIONI:
      ============================================================
      1) SE HAI UN'UNICA IMMAGINE LUNGA (caso attuale):
         Il file si chiama "menu.jpg" e basta caricarlo nella stessa cartella.

      2) SE IN FUTURO VORRAI PIÙ IMMAGINI IN SEQUENZA:
         Sostituisci la riga <img> qui sotto con più righe, esempio:
         <img src="01-antipasti.jpg" alt="Antipasti">
         <img src="02-primi.jpg" alt="Primi">
         <img src="03-secondi.jpg" alt="Secondi">
         <img src="04-dolci.jpg" alt="Dolci">

      Il browser le mostra automaticamente una sotto l'altra,
      senza spazi né stacchi.
      ============================================================
    -->

    <img
      src="menu.jpg"
      alt="Menù del pranzo - Borgo Conero"
      id="menu-image"
      onerror="document.getElementById('error').style.display='block'; document.getElementById('loading').classList.add('hidden');"
    >

  </main>

  <!-- Messaggio mostrato solo se l'immagine non si carica -->
  <div class="error-message" id="error">
    <h2>Menù momentaneamente non disponibile</h2>
    <p>Stiamo aggiornando il menù.<br>Chiedi pure al personale di sala.</p>
  </div>

  <script>
    // Nasconde lo schermo di caricamento appena l'immagine è pronta
    const menuImage = document.getElementById('menu-image');
    const loading = document.getElementById('loading');

    function hideLoading() {
      loading.classList.add('hidden');
      // Dopo l'animazione, rimuoviamo del tutto l'elemento
      setTimeout(() => loading.remove(), 500);
    }

    if (menuImage.complete && menuImage.naturalHeight !== 0) {
      // Immagine già caricata (cache)
      hideLoading();
    } else {
      menuImage.addEventListener('load', hideLoading);
      // Fallback: dopo 5 secondi nascondiamo comunque il loader
      setTimeout(hideLoading, 5000);
    }
  </script>

</body>
</html>
